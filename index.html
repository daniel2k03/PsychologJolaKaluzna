<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przenosimy się! - Metoda 5F</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        lavenderLight: '#F5F2FA',
                        lavenderMedium: '#9E8ECB',
                        lavenderDark: '#4D3E7F',
                        pinkLight: '#FDF3F6',
                        pinkMedium: '#E2A9BE',
                        pinkDark: '#7F3D58',
                        basePlum: '#282030',
                        bgCream: '#FDFBF7'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#F3EFF8] text-basePlum font-sans antialiased flex items-center justify-center min-h-screen p-4 selection:bg-lavenderMedium selection:text-white">

    <div class="max-w-lg w-full bg-white rounded-[2rem] p-8 md:p-12 text-center shadow-xl border border-lavenderMedium/20 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2.5 bg-gradient-to-r from-lavenderMedium via-pinkMedium to-lavenderDark"></div>
        
        <div class="w-16 h-16 bg-[#F5F2FA] rounded-full flex items-center justify-center mx-auto mb-6 text-[#4D3E7F] shadow-sm border border-lavenderMedium/20">
            <i data-lucide="map-pin" class="w-7 h-7"></i>
        </div>

        <h2 class="font-serif text-2xl md:text-3xl font-bold text-basePlum mb-4">Mamy nowy adres strony</h2>
        
        <p class="text-neutral-600 mb-8 leading-relaxed text-sm md:text-base">
            Aby ułatwić dostęp do materiałów, przenieśliśmy nasze centrum testów na nowy serwer. 
            Nie musisz nic robić – za chwilę strona automatycznie przeniesie Cię we właściwe miejsce.
        </p>

        <div class="bg-[#FDFBF7] border border-neutral-100 rounded-2xl p-5 mb-8 shadow-sm">
            <p class="text-[11px] md:text-xs text-lavenderDark font-bold uppercase tracking-widest mb-1.5">Automatyczne przekierowanie za:</p>
            <div class="flex items-baseline justify-center gap-1.5">
                <span class="font-mono text-5xl font-extrabold text-[#4D3E7F]" id="countdown">30</span>
                <span class="text-sm text-neutral-500 font-medium">sekund</span>
            </div>
        </div>

        <a href="https://psychologjolakaluzna.github.io/Testy/" id="manual-redirect" class="inline-flex items-center justify-center gap-2 bg-[#4D3E7F] text-[#FDFBF7] hover:bg-[#9E8ECB] px-8 py-3.5 rounded-full text-sm font-bold transition-all shadow-md transform hover:scale-[1.02] w-full sm:w-auto">
            Przejdź szybciej <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>
    </div>

    <script>
        // --- KONFIGURACJA ---
        // Podmień poniższy adres na swój aktualny link z Github Pages
        const newUrl = "https://psychologjolakaluzna.github.io/Testy/"; 
        
        let timeLeft = 30; // Czas w sekundach
        
        // Inicjalizacja ikon
        lucide.createIcons();

        // Przypisanie linku do przycisku
        document.getElementById('manual-redirect').href = newUrl;
        const countdownElement = document.getElementById('countdown');

        // Logika odliczania i przekierowania
        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.replace(newUrl); // Używamy replace, aby użytkownik nie wracał tu przyciskiem "Wstecz" w przeglądarce
            }
        }, 1000);
    </script>
</body>
</html>
